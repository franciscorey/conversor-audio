<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor MP3 a MP2 en Lote</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --primary-hover: #357abd;
            --text: #333333;
            --border: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #2c3e50;
        }

        /* Zona de Arrastre */
        #drop-zone {
            border: 3px dashed var(--border);
            border-radius: 8px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            margin-bottom: 20px;
        }

        #drop-zone.hover {
            border-color: var(--primary);
            background: #edf5ff;
        }

        #drop-zone p {
            margin: 0;
            font-size: 16px;
            color: #666;
        }

        /* Lista de Archivos y Estado */
        #status-list {
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            background: #fff;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f9f9f9;
            font-size: 14px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .status {
            font-weight: bold;
        }
        .status.waiting { color: #f39c12; }
        .status.processing { color: var(--primary); }
        .status.done { color: #2ecc71; }
        .status.error { color: #e74c3c; }

        #loading-ffmpeg {
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor MP3 a MP2 en Lote</h1>
    <div id="loading-ffmpeg">Cargando motor de conversión (FFmpeg)...</div>
    
    <div id="drop-zone">
        <p>Arrastra tus archivos MP3 aquí o haz clic para seleccionarlos</p>
        <input type="file" id="file-input" multiple accept=".mp3" style="display: none;">
    </div>

    <div id="status-list" style="display: none;">
        <!-- Aquí se meterán dinámicamente los archivos -->
    </div>
</div>


<!-- 1. Cargamos el script principal desde la raíz -->
<script src="ffmpeg.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        // 2. Simplificamos la inicialización. Al estar todo en la raíz, 
        // FFmpeg buscará automáticamente 'ffmpeg-core.js' y 'ffmpeg-core.wasm' en el mismo directorio.
        const ffmpeg = createFFmpeg({ 
            log: true 
        });
        
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const statusList = document.getElementById('status-list');
        const loadingText = document.getElementById('loading-ffmpeg');

        let isFFmpegReady = false;

        async function initFFmpeg() {
            try {
                await ffmpeg.load();
                isFFmpegReady = true;
                loadingText.textContent = "¡Motor listo! Ya puedes arrastrar tus MP3.";
                loadingText.style.color = "#2ecc71";
            } catch (error) {
                console.error(error);
                loadingText.textContent = "Error al cargar el motor. Revisa la consola.";
                loadingText.style.color = "#e74c3c";
            }
        }
        initFFmpeg();

        // Eventos de arrastre
        dropZone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            dropZone.classList.add('hover'); 
        });

        dropZone.addEventListener('dragleave', () => { 
            dropZone.classList.remove('hover'); 
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); 
            dropZone.classList.remove('hover');
            if (!isFFmpegReady) return alert('Espera a que el motor esté listo.');
            const files = Array.from(e.dataTransfer.files).filter(file => file.name.toLowerCase().endsWith('.mp3'));
            if (files.length > 0) processBatch(files);
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (!isFFmpegReady) return alert('Espera a que el motor esté listo.');
            const files = Array.from(e.target.files);
            if (files.length > 0) processBatch(files);
        });

        // Procesar lote secuencialmente
        async function processBatch(files) {
            statusList.style.display = 'block'; 
            statusList.innerHTML = '';
            
            const queue = files.map((file, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'file-item';
                itemDiv.innerHTML = `<span>${file.name}</span><span class="status waiting" id="status-${index}">En espera...</span>`;
                statusList.appendChild(itemDiv);
                return { file, index };
            });

            for (const task of queue) {
                const statusLabel = document.getElementById(`status-${task.index}`);
                statusLabel.textContent = "Procesando..."; 
                statusLabel.className = "status processing";
                try {
                    await convertMp3ToMp2(task.file);
                    statusLabel.textContent = "¡Listo!"; 
                    statusLabel.className = "status done";
                } catch (err) {
                    console.error("Error detallado en la conversión:", err); 
                    statusLabel.textContent = "Error"; 
                    statusLabel.className = "status error";
                }
            }
        }

        // Función de conversión estable con argumentos independientes
        async function convertMp3ToMp2(file) {
            const finalOutputName = file.name.replace(/\.mp3$/i, '.mp2');
            const tempInput = "in.mp3";
            const tempOutput = "out.mp2";
            
            const fileBuffer = await fetchFile(file);
            ffmpeg.FS('writeFile', tempInput, fileBuffer);
            
            // Argumentos separados estrictamente para evitar fallos de pthreads
            await ffmpeg.run(
                '-i', tempInput, 
                '-c:a', 'mp2', 
                '-b:a', '128k', 
                '-ar', '44100', 
                tempOutput
            );
            
            const data = ffmpeg.FS('readFile', tempOutput);
            const blob = new Blob([data.buffer], { type: 'audio/mpeg' });
            const url = URL.createObjectURL(blob);
            
            await new Promise((resolve) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = url; 
                    a.download = finalOutputName;
                    document.body.appendChild(a); 
                    a.click();
                    document.body.removeChild(a);
                    resolve();
                }, 50);
            });
            
            URL.revokeObjectURL(url);
            ffmpeg.FS('unlink', tempInput); 
            ffmpeg.FS('unlink', tempOutput);
        }
    });
</script>
